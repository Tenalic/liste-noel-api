<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

<div th:fragment="header(title)">

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 14px;
            color: #333;
            line-height: 1.6;
        }

        h2 {
            color: #2c3e50;
        }

        h3 {
            margin-top: 25px;
            color: #34495e;
        }

        a {
            color: #1976d2;
            text-decoration: none;
        }

        ul {
            padding-left: 20px;
        }

        hr {
            margin-top: 30px;
        }
    </style>

    <h2 th:text="${title}"></h2>

    <p>Bonjour,</p>

</div>

</body>
</html>
