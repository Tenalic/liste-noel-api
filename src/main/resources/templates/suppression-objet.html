<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:replace="~{fragments/header :: header('Objet supprimé')}"></div>

<p>
    Un objet appartenant à une liste présente dans vos favoris a été supprimé.
</p>

<h3>Objet supprimé</h3>

<ul>
    <li><strong>Titre :</strong> <span th:text="${title}"></span></li>
    <li><strong>Description :</strong> <span th:text="${description}"></span></li>
    <li><strong>Lien :</strong> <a th:href="${url}" th:text="${url}"></a></li>
</ul>

<p>
    <strong>Liste :</strong>
    <span th:text="${listName}"></span>
</p>

<p>
    Consulter la liste :
</p>

<p>
    <a th:href="${listUrl}" th:text="${listUrl}"></a>
</p>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
