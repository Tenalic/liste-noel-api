<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:replace="~{fragments/header :: header('Objet modifié')}"></div>

<p>
    Un objet d'une liste faisant partie de vos favoris a été modifié.
</p>

<h3>Anciennes informations</h3>

<ul>
    <li><strong>Titre :</strong> <span th:text="${oldTitle}"></span></li>
    <li><strong>Description :</strong> <span th:text="${oldDescription}"></span></li>
    <li><strong>Lien :</strong> <a th:href="${oldUrl}" th:text="${oldUrl}"></a></li>
</ul>

<h3>Nouvelles informations</h3>

<ul>
    <li><strong>Titre :</strong> <span th:text="${newTitle}"></span></li>
    <li><strong>Description :</strong> <span th:text="${newDescription}"></span></li>
    <li><strong>Lien :</strong> <a th:href="${newUrl}" th:text="${newUrl}"></a></li>
    <li><strong>Priorité :</strong> <span th:text="${priorityLabel}"></span></li>
</ul>

<p>
    <strong>Liste :</strong>
    <span th:text="${listName}"></span>
</p>

<p>
    Consulter la liste :
</p>

<p>
    <a th:href="${listUrl}" th:text="${listUrl}"></a>
</p>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
